name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mpv ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg mpv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: jorja-clipper-linux
            spec_file: packaging/linux.spec
          - os: macos-latest
            artifact_name: jorja-clipper-macos
            spec_file: packaging/macos.spec
          - os: windows-latest
            artifact_name: jorja-clipper-windows
            spec_file: packaging/windows.spec
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mpv ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg mpv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean ${{ matrix.spec_file }}

      # ------------------------------------------------------------------
      # macOS code-signing + notarization + DMG
      # Required GitHub secrets (repo > Settings > Secrets):
      #   MACOS_CERTIFICATE          – base64-encoded .p12
      #   MACOS_CERTIFICATE_PASSWORD – .p12 password
      #   MACOS_CERTIFICATE_NAME     – e.g. "Developer ID Application: Name (TEAMID)"
      #   APPLE_ID                   – Apple ID email
      #   APPLE_APP_SPECIFIC_PASSWORD– App-specific password for notarytool
      #   APPLE_TEAM_ID              – 10-character Apple Team ID
      # ------------------------------------------------------------------
      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No MACOS_CERTIFICATE secret found; skipping signing."
            exit 0
          fi
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Code-sign macOS app
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No signing certificate available; skipping codesign."
            exit 0
          fi
          # Sign embedded Mach-O binaries first
          find "dist/Jorja Clipper.app" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --sign "$MACOS_CERTIFICATE_NAME" --timestamp --force --options runtime {} \;
          # Sign the launcher binary if present outside the bundle
          if [ -f "dist/jorja-clipper" ]; then
            codesign --sign "$MACOS_CERTIFICATE_NAME" --timestamp --force --options runtime "dist/jorja-clipper"
          fi
          # Deep-sign the .app bundle with hardened runtime
          codesign --deep --force --verify --verbose --sign "$MACOS_CERTIFICATE_NAME" \
            --timestamp --options runtime --entitlements packaging/macos.entitlements.plist \
            "dist/Jorja Clipper.app"

      - name: Zip macOS app for notarization
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Jorja Clipper.app" \
            "dist/jorja-clipper-notarize.zip"

      - name: Notarize macOS app
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No signing certificate available; skipping notarization."
            exit 0
          fi
          xcrun notarytool submit "dist/jorja-clipper-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "No signing certificate available; skipping stapling."
            exit 0
          fi
          xcrun stapler staple "dist/Jorja Clipper.app"
          codesign --verify --deep --strict --verbose=2 "dist/Jorja Clipper.app"

      - name: Build DMG
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          rm -f "dist/Jorja Clipper.dmg"
          create-dmg \
            --volname "Jorja Clipper" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "dist/Jorja Clipper.dmg" \
            "dist/Jorja Clipper.app"

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd dist
          rm -f jorja-clipper-macos.zip
          zip -r jorja-clipper-macos.zip "Jorja Clipper.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/jorja-clipper
            dist/jorja-clipper.exe
            dist/jorja-clipper-macos.zip
            dist/Jorja Clipper.dmg
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/jorja-clipper-linux/*
            artifacts/jorja-clipper-macos/*
            artifacts/jorja-clipper-windows/*
