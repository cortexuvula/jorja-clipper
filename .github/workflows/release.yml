name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg mpv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: jorja-clipper-linux
            spec_file: packaging/linux.spec
          - os: macos-latest
            artifact_name: jorja-clipper-macos
            spec_file: packaging/macos.spec
          - os: windows-latest
            artifact_name: jorja-clipper-windows
            spec_file: packaging/windows.spec
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg mpv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,packaging]'

      - name: Build with PyInstaller
        run: pyinstaller --clean ${{ matrix.spec_file }}

      # ---------------------------------------------------------------
      # macOS code-signing + notarization
      # Secrets: https://github.com/cortexuvula/jorja-clipper/settings/secrets/actions
      # Guide:   Obsidian → RSVP Reader - macOS Signing Credentials
      # ---------------------------------------------------------------

      - name: "[macOS] Import signing certificate"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::No MACOS_CERTIFICATE_P12_BASE64 secret; skipping signing."
            exit 0
          fi
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          # Decode and import .p12
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          # Add to search list
          security list-keychains -d user -s build.keychain login.keychain
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: "[macOS] Code-sign .app bundle"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::No signing certificate; skipping codesign."
            exit 0
          fi
          APP="dist/Jorja Clipper.app"
          # Fix PyInstaller's Python.framework symlinks that break codesign
          FW="$APP/Contents/Frameworks/Python.framework"
          if [ -d "$FW" ]; then
            # Remove the broken Versions/Current symlink and replace with copy
            rm -f "$FW/Versions/Current"
            # Find the actual version directory and copy it
            VER_DIR=$(find "$FW/Versions" -maxdepth 1 -type d ! -name Versions | head -1)
            if [ -n "$VER_DIR" ]; then
              cp -a "$VER_DIR" "$FW/Versions/Current"
            fi
            # Remove top-level symlinks and recreate as copies
            for link in "$FW"/*; do
              if [ -L "$link" ]; then
                target=$(readlink "$link")
                rm -f "$link"
                cp -a "$FW/$target" "$link" 2>/dev/null || true
              fi
            done
          fi
          # Sign embedded dylibs/so files first
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --sign "$IDENTITY" --timestamp --force --options runtime {} \;
          # Deep-sign the bundle with hardened runtime + entitlements
          codesign --deep --force --verify --verbose=2 \
            --sign "$IDENTITY" --timestamp --options runtime \
            --entitlements packaging/macos.entitlements.plist \
            "$APP"
          echo "Signed. Verifying..."
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: "[macOS] Zip for notarization"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$CERT_BASE64" ]; then exit 0; fi
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Jorja Clipper.app" \
            "dist/jorja-clipper-notarize.zip"

      - name: "[macOS] Notarize with Apple"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::No signing certificate; skipping notarization."
            exit 0
          fi
          xcrun notarytool submit "dist/jorja-clipper-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          rm -f dist/jorja-clipper-notarize.zip

      - name: "[macOS] Staple notarization ticket"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$CERT_BASE64" ]; then exit 0; fi
          xcrun stapler staple "dist/Jorja Clipper.app"

      - name: "[macOS] Build DMG"
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          rm -f "dist/Jorja Clipper.dmg"
          create-dmg \
            --volname "Jorja Clipper" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "dist/Jorja Clipper.dmg" \
            "dist/Jorja Clipper.app" || true

      - name: "[macOS] Zip app bundle"
        if: runner.os == 'macOS'
        run: |
          cd dist
          rm -f jorja-clipper-macos.zip
          zip -r jorja-clipper-macos.zip "Jorja Clipper.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/jorja-clipper
            dist/jorja-clipper.exe
            dist/jorja-clipper-macos.zip
            dist/Jorja Clipper.dmg
          if-no-files-found: warn

  build-deb:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: jorja-clipper-linux
          path: dist

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/jorja_clipper/__init__.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          mkdir -p deb-root/DEBIAN
          mkdir -p deb-root/opt/jorja-clipper
          mkdir -p deb-root/usr/bin
          mkdir -p deb-root/usr/share/applications
          cp dist/jorja-clipper deb-root/opt/jorja-clipper/
          chmod 755 deb-root/opt/jorja-clipper/jorja-clipper
          ln -sf /opt/jorja-clipper/jorja-clipper deb-root/usr/bin/jorja-clipper
          cat > deb-root/usr/share/applications/jorja-clipper.desktop << 'EOF'
          [Desktop Entry]
          Name=Jorja Clipper
          Comment=Video highlight clipper for sports games
          Exec=/opt/jorja-clipper/jorja-clipper %f
          Icon=video-x-generic
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;
          MimeType=video/mp4;video/x-matroska;video/avi;
          EOF
          cat > deb-root/DEBIAN/control << EOF
          Package: jorja-clipper
          Version: ${{ steps.version.outputs.version }}
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: mpv, ffmpeg
          Maintainer: cortexuvula <devlead@andrehugo.ca>
          Description: Video highlight clipper for sports games
           Press a hotkey during video playback to save a lossless clip
           of the surrounding seconds. Designed for clipping basketball
           game highlights in real time.
          EOF
          cat > deb-root/DEBIAN/postinst << 'POSTINST'
          #!/bin/sh
          set -e
          if command -v update-desktop-database > /dev/null 2>&1; then
            update-desktop-database /usr/share/applications || true
          fi
          POSTINST
          chmod 755 deb-root/DEBIAN/postinst
          dpkg-deb --build deb-root jorja-clipper-${{ steps.version.outputs.version }}-amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: jorja-clipper-deb
          path: "*.deb"

  release:
    needs: [build, build-deb]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/jorja-clipper-linux/*
            artifacts/jorja-clipper-macos/*
            artifacts/jorja-clipper-windows/*
            artifacts/jorja-clipper-deb/*
