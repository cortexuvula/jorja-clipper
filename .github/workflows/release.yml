name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg mpv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: jorja-clipper-linux
            spec_file: packaging/linux.spec
          - os: macos-latest
            artifact_name: jorja-clipper-macos
            spec_file: packaging/macos.spec
          - os: windows-latest
            artifact_name: jorja-clipper-windows
            spec_file: packaging/windows.spec
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev ffmpeg

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv ffmpeg

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg mpv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,packaging]'

      - name: Build with PyInstaller
        run: pyinstaller --clean ${{ matrix.spec_file }}

      # ---------------------------------------------------------------
      # macOS code-signing + notarization
      # Secrets: https://github.com/cortexuvula/jorja-clipper/settings/secrets/actions
      # Guide:   Obsidian → RSVP Reader - macOS Signing Credentials
      # ---------------------------------------------------------------

      - name: "[macOS] Import signing certificate"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::No MACOS_CERTIFICATE_P12_BASE64 secret; skipping signing."
            exit 0
          fi
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          # Decode and import .p12
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          # Add to search list
          security list-keychains -d user -s build.keychain login.keychain
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: "[macOS] Code-sign .app bundle"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::No signing certificate; skipping codesign."
            exit 0
          fi
          APP="dist/Jorja Clipper.app"

          # Create standalone Python binary for PyInstaller bootloader
          # The bootloader expects /Contents/Frameworks/Python but PyInstaller
          # creates it as a symlink to Python.framework/Python
          if [ -e "$APP/Contents/Frameworks/Python" ]; then
            echo "Replacing Python symlink with actual binary for bootloader"
            # Remove the symlink
            rm -f "$APP/Contents/Frameworks/Python"
            # Copy the actual binary from the framework
            cp "$APP/Contents/Frameworks/Python.framework/Versions/Current/Python" \
               "$APP/Contents/Frameworks/Python"
          fi

          # Sign framework internals first (inside-out)
          find "$APP/Contents/Frameworks" -name "*.framework" -type d | while read -r fw; do
            # Sign all Mach-O files inside the framework
            find "$fw" -type f | while read -r f; do
              if file -b "$f" | grep -q "Mach-O"; then
                codesign --sign "$IDENTITY" --timestamp --force --options runtime "$f"
              fi
            done
            # Sign the framework itself
            codesign --sign "$IDENTITY" --timestamp --force --options runtime "$fw"
          done

          # Sign the standalone Python binary (bootloader requires it)
          if [ -f "$APP/Contents/Frameworks/Python" ]; then
            echo "Signing standalone Python binary for bootloader"
            codesign --sign "$IDENTITY" --timestamp --force --options runtime \
              "$APP/Contents/Frameworks/Python"
          fi

          # Sign all other Mach-O binaries in the bundle
          find "$APP" -type f | while read -r f; do
            if file -b "$f" | grep -q "Mach-O"; then
              # Skip already-signed framework contents
              if [[ "$f" != *"/Frameworks/"*".framework/"* ]] && [[ "$f" != *"/Frameworks/Python" ]]; then
                codesign --sign "$IDENTITY" --timestamp --force --options runtime "$f"
              fi
            fi
          done
          # Sign the main executable
          codesign --sign "$IDENTITY" --timestamp --force --options runtime \
            --entitlements packaging/macos.entitlements.plist \
            "$APP"
          echo "Signed."
          codesign --verify --deep --strict "$APP" || echo "::warning::codesign verify failed"

      - name: "[macOS] Zip for notarization"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$CERT_BASE64" ]; then exit 0; fi
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Jorja Clipper.app" \
            "dist/jorja-clipper-notarize.zip"

      - name: "[macOS] Notarize with Apple"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "::warning::No signing certificate; skipping notarization."
            exit 0
          fi
          # Capture submission ID for log fetch on failure
          OUTPUT=$(xcrun notarytool submit "dist/jorja-clipper-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait 2>&1) || true
          echo "$OUTPUT"
          # Fetch detailed log if notarization was not accepted
          if echo "$OUTPUT" | grep -q "status: Invalid"; then
            SUBMISSION_ID=$(echo "$OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
            echo "::error::Notarization failed (Invalid). Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$PASSWORD" \
              --team-id "$TEAM_ID" || true
            exit 1
          fi
          rm -f dist/jorja-clipper-notarize.zip

      - name: "[macOS] Staple notarization ticket"
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$CERT_BASE64" ]; then exit 0; fi
          # Apple's CloudKit propagation can lag 30-60 s after notarization.
          # Retry up to 5 times with 30-second waits.
          for i in 1 2 3 4 5; do
            echo "Staple attempt $i..."
            if xcrun stapler staple "dist/Jorja Clipper.app"; then
              echo "Stapled successfully."
              exit 0
            fi
            echo "Attempt $i failed — waiting 30 s for CloudKit propagation..."
            sleep 30
          done
          echo "::warning::Stapling failed after 5 retries — zip is still notarized (Gatekeeper checks online)"

      - name: "[macOS] Build DMG"
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          rm -f "dist/Jorja Clipper.dmg"
          create-dmg \
            --volname "Jorja Clipper" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "dist/Jorja Clipper.dmg" \
            "dist/Jorja Clipper.app" || true

      - name: "[macOS] Zip app bundle"
        if: runner.os == 'macOS'
        run: |
          cd dist
          rm -f jorja-clipper-macos.zip
          zip -r jorja-clipper-macos.zip "Jorja Clipper.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/jorja-clipper
            dist/jorja-clipper.exe
            dist/jorja-clipper-macos.zip
            dist/Jorja Clipper.dmg
          if-no-files-found: warn

  build-deb:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: jorja-clipper-linux
          path: dist

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/jorja_clipper/__init__.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          mkdir -p deb-root/DEBIAN
          mkdir -p deb-root/opt/jorja-clipper
          mkdir -p deb-root/usr/bin
          mkdir -p deb-root/usr/share/applications
          cp dist/jorja-clipper deb-root/opt/jorja-clipper/
          chmod 755 deb-root/opt/jorja-clipper/jorja-clipper
          ln -sf /opt/jorja-clipper/jorja-clipper deb-root/usr/bin/jorja-clipper
          cat > deb-root/usr/share/applications/jorja-clipper.desktop << 'EOF'
          [Desktop Entry]
          Name=Jorja Clipper
          Comment=Video highlight clipper for sports games
          Exec=/opt/jorja-clipper/jorja-clipper %f
          Icon=video-x-generic
          Terminal=false
          Type=Application
          Categories=AudioVideo;Video;
          MimeType=video/mp4;video/x-matroska;video/avi;
          EOF
          cat > deb-root/DEBIAN/control << EOF
          Package: jorja-clipper
          Version: ${{ steps.version.outputs.version }}
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: mpv, ffmpeg
          Maintainer: cortexuvula <devlead@andrehugo.ca>
          Description: Video highlight clipper for sports games
           Press a hotkey during video playback to save a lossless clip
           of the surrounding seconds. Designed for clipping basketball
           game highlights in real time.
          EOF
          cat > deb-root/DEBIAN/postinst << 'POSTINST'
          #!/bin/sh
          set -e
          if command -v update-desktop-database > /dev/null 2>&1; then
            update-desktop-database /usr/share/applications || true
          fi
          POSTINST
          chmod 755 deb-root/DEBIAN/postinst
          dpkg-deb --build deb-root jorja-clipper-${{ steps.version.outputs.version }}-amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: jorja-clipper-deb
          path: "*.deb"

  release:
    needs: [build, build-deb]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/jorja-clipper-linux/*
            artifacts/jorja-clipper-macos/*
            artifacts/jorja-clipper-windows/*
            artifacts/jorja-clipper-deb/*
